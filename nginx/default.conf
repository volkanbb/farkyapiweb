# nginx/default.conf
server {
    listen 80;
    server_name localhost;
    client_max_body_size 50M;

    # Frontend
    location / {
        proxy_pass http://frontend:4000; # SSR is usually on port 4000
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Fallback for SPA routing if SSR fails
        # try_files $uri $uri/ /index.html; 
    }

    # Sitemap
    location = /sitemap.xml {
        proxy_pass http://backend:8080/api/v1/Sitemap/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger
    location /swagger/ {
        proxy_pass http://backend:8080/swagger/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Static uploads from backend (if served directly by Nginx in prod, but for now passing to backend)
    location /uploads/ {
        proxy_pass http://backend:8080/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

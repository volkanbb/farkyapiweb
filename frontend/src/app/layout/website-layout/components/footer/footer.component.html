<footer class="website-footer">
  <div class="container">
    <div class="footer-grid">
      <div class="footer-brand">
        <div class="logo">
          <img src="assets/images/logo.png" alt="FARK YAPI" class="brand-logo footer-logo">
        </div>
      </div>
      
      <div class="footer-contact">
        <h3>İLETİŞİM</h3>
        <p *ngIf="settings?.address">
          <span class="material-icons-outlined">location_on</span>
          {{ settings?.address }}
        </p>
        <p *ngIf="settings?.phone">
          <a [href]="whatsappLink" target="_blank" rel="noopener noreferrer" style="color: inherit; text-decoration: none; display: flex; align-items: center; gap: 4px;">
            <span class="material-icons-outlined">phone</span>
            {{ settings?.phone }}
          </a>
        </p>
        <p *ngIf="settings?.email">
          <a [href]="'mailto:' + settings?.email" style="color: inherit; text-decoration: none; display: flex; align-items: center; gap: 4px;">
            <span class="material-icons-outlined">email</span>
            {{ settings?.email }}
          </a>
        </p>
        <p *ngIf="settings?.instagramUrl">
          <a [href]="settings?.instagramUrl" target="_blank" rel="noopener noreferrer" style="display: flex; align-items: center; gap: 8px; color: inherit; text-decoration: none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-instagram">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
              <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
            Instagram
          </a>
        </p>
      </div>
    </div>
  </div>
</footer>

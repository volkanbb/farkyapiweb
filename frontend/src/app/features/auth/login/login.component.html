<div class="login-container">
  <div class="login-card">
    <div class="brand">
      <span class="icon material-icons-outlined">architecture</span>
      <span>Fark Yapı</span>
    </div>
    <h2>Admin Paneli Girişi</h2>
    <p>Devam etmek için lütfen giriş yapın.</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">E-posta Adresi</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          placeholder="E-posta adresiniz"
          [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        >
        <div class="error-message" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Geçerli bir e-posta adresi giriniz.
        </div>
      </div>

      <div class="form-group">
        <label for="password">Şifre</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          placeholder="Şifreniz"
          [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        >
        <div class="error-message" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Şifre zorunludur.
        </div>
      </div>

      <div class="error-alert" *ngIf="errorMessage">
        <span class="material-icons-outlined">error_outline</span>
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="isLoading" class="spinner"></span>
        <span *ngIf="!isLoading">Giriş Yap</span>
      </button>
    </form>
  </div>
</div>

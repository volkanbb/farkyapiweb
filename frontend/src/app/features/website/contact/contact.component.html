<main class="page-container">
  <div class="page-content">
    <div class="container">
      <div class="contact-layout">
        
        <!-- Sol Taraf: İletişim Bilgileri -->
        <div class="contact-info">
          <h1 class="page-title">İLETİŞİM</h1>
          
          <div class="info-list">
            <div class="info-item" *ngIf="settings?.address">
              <div class="icon-circle">
                <span class="material-icons-outlined">location_on</span>
              </div>
              <div class="info-text">
                {{ settings?.address }}
              </div>
            </div>
            
            <div class="info-item" *ngIf="settings?.phone">
              <div class="icon-circle">
                <span class="material-icons-outlined">phone</span>
              </div>
              <div class="info-text">
                <a [href]="whatsappLink" target="_blank" rel="noopener noreferrer" style="color: inherit; text-decoration: none;">
                  {{ settings?.phone }}
                </a>
              </div>
            </div>

            <div class="info-item" *ngIf="settings?.email">
              <div class="icon-circle">
                <span class="material-icons-outlined">email</span>
              </div>
              <div class="info-text">
                <a [href]="'mailto:' + settings?.email" style="color: inherit; text-decoration: none;">
                  {{ settings?.email }}
                </a>
              </div>
            </div>
          </div>
        </div>
        
        <!-- Sağ Taraf: Harita -->
        <div class="contact-map">
          <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d4197.355763506043!2d29.5034504!3d40.0838347!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14cbcbe767722cad%3A0x54ca93893e8d65f4!2sFark%20Yapi!5e1!3m2!1str!2str!4v1783786551446!5m2!1str!2str" 
            width="100%" 
            height="100%" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="strict-origin-when-cross-origin">
          </iframe>
        </div>

      </div>
    </div>
  </div>
</main>
